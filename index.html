<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Perceptis</title>
  <meta name="description" content="Perceptis: consultoría en datos, procesos y tecnología para mejorar resultados de negocio." />
  <meta property="og:title" content="Perceptis" />
  <meta property="og:description" content="Si no confías en tus datos y procesos, estás perdiendo dinero todos los días." />
  <meta property="og:image" content="perceptis-portada.png" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: #07385a; font-family: Arial, Helvetica, sans-serif; }
    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #07385a;
    }
    .hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-height: 560px;
      overflow: hidden;
    }
    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .email-link {
      position: absolute;
      left: 37.1%;
      top: 81.8%;
      width: 25.1%;
      height: 11.2%;
      border-radius: 18px;
      text-indent: -9999px;
      outline-offset: 4px;
    }
    .email-link:focus-visible {
      outline: 3px solid #ffffff;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    @media (max-width: 768px) {
      .hero { min-height: 100vh; }
      .hero img { object-fit: cover; object-position: center; }
      .email-link {
        left: 23%;
        top: 80%;
        width: 54%;
        height: 11%;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero" aria-label="Portada de Perceptis">
      <img src="perceptis-portada.png" alt="Perceptis. Si no confías en tus datos y procesos, estás perdiendo dinero todos los días. Contáctanos: jorge.garcia@perceptis.mx" />
      <a class="email-link" href="mailto:jorge.garcia@perceptis.mx?subject=Contacto%20desde%20perceptis.mx">Contáctanos por correo</a>
      <h1 class="sr-only">Perceptis</h1>
      <p class="sr-only">Si no confías en tus datos y procesos, estás perdiendo dinero todos los días.</p>
    </section>
  </main>
</body>
</html>
